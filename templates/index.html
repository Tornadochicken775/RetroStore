<!DOCTYPE html>
<html>
<head>
    <title>RetroStore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <style>
        body { font-family: Helvetica; background: #2D3642; color: white; padding: 10px; margin: 0; }
        .search-box { width: 90%; padding: 10px; margin: 0 auto 20px auto; display: block; box-sizing: border-box; border: 1px solid #ccc; font-size: 16px; border-radius: 5px; }
        .app-item { background: #444; padding: 10px; margin-bottom: 10px; border-radius: 10px; word-wrap: break-word; overflow: hidden; }
        h2 { color: #007AFF; margin-top: 20px; border-bottom: 1px solid #555; padding-bottom: 5px; }
        h3 { margin-top: 0; font-size: 18px; }
        .btn { 
            display: block; background-color: #007AFF; color: white; padding: 15px 0; 
            margin: 10px 0; border-radius: 10px; text-decoration: none; 
            text-align: center; font-weight: bold; border: none; -webkit-appearance: none; 
        }
    </style>
</head>
<body>
    <h1>RetroStore</h1>
    <p style="font-size: 12px; color: #aaa; margin-top: -10px; margin-bottom: 20px;">
        Last library update: {{ last_updated }}
    </p>
    
    <input type="text" id="searchInput" class="search-box" placeholder="Search apps..." oninput="filterApps()" onchange="filterApps()">

    <div id="appContainer">
        {% for category, files in categories.items() %}
            <h2>{{ category }}</h2>
            {% for filename in files %}
            <div class="app-item">
                <h3 class="app-name">{{ filename }}</h3>
                <!-- Dynamic URL generated using request.host_url to ensure it works on Render -->
                <a href="itms-services://?action=download-manifest&url={{ request.host_url.rstrip('/') }}/manifest/{{ filename[:-4] }}.plist" class="btn">Install</a>
            </div>
            {% endfor %}
        {% endfor %}
    </div>

    <script type="text/javascript">
        function filterApps() {
            var input = document.getElementById('searchInput').value.toLowerCase();
            var container = document.getElementById('appContainer');
            var apps = container.getElementsByClassName('app-item');
            
            for (var i = 0; i < apps.length; i++) {
                var name = apps[i].getElementsByClassName('app-name')[0].innerText.toLowerCase();
                if (name.indexOf(input) > -1) {
                    apps[i].style.display = "block";
                } else {
                    apps[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
